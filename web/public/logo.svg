<?xml version="1.0" encoding="UTF-8"?>
<!--
  Solennix — Logo horizontal
  2 Aros Entrelazados (Dorado y Naranja) formando una S
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 310 80">
  <defs>
    <!-- Fondo de Icono Elegante -->
    <linearGradient id="iconBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2a201b"/>
      <stop offset="50%" stop-color="#120d0b"/>
      <stop offset="100%" stop-color="#0a0504"/>
    </linearGradient>

    <!-- ── Gradiente Dorado (Aro 1) ── -->
    <linearGradient id="gold-grad" x1="0" y1="0.5" x2="1" y2="0.5">
      <stop offset="0%" stop-color="#b45309"/>
      <stop offset="30%" stop-color="#f59e0b"/>
      <stop offset="50%" stop-color="#fef3c7"/>
      <stop offset="70%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>

    <!-- ── Gradiente Slate (Aro 2) ── -->
    <linearGradient id="orange-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#475569"/>
      <stop offset="20%" stop-color="#64748b"/>
      <stop offset="50%" stop-color="#94a3b8"/>
      <stop offset="80%" stop-color="#64748b"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>

    <!-- ── Sombra de Oclusión ── -->
    <filter id="drop-shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="3" flood-color="#000000" flood-opacity="0.8"/>
    </filter>

    <!-- Gradiente del Texto -->
    <linearGradient id="textGold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="25%" stop-color="#f59e0b"/>
      <stop offset="50%" stop-color="#fffbeb"/>
      <stop offset="75%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>

    <filter id="textGlow" x="-10%" y="-20%" width="120%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="blur"/>
      <feFlood flood-color="#f59e0b" flood-opacity="0.3" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

  </defs>

  <rect x="0" y="0" width="80" height="80" rx="20" ry="20" fill="url(#iconBg)"/>

  <g transform="translate(4, 0)">
    <!-- ARO INFERIOR (NARANJA) -->
    <!-- Posición: Abajo y un poco a la izquierda -->
    <circle cx="33" cy="50" r="16" fill="none" stroke="url(#orange-grad)" stroke-width="9" filter="url(#drop-shadow)"/>
    
    <!-- LÍNEA DE BRILLO INTERIOR (Slate) -->
    <circle cx="33" cy="50" r="16" fill="none" stroke="#e2e8f0" stroke-width="1.2" opacity="0.6"/>

    <!-- ARO SUPERIOR (DORADO) -->
    <!-- Este aro se dibuja completo sobre el Naranja. 
         Al no superponer el Naranja de vuelta, se vería que el Dorado tapa TODO.
         Queremos entrelazar. -->
    <circle cx="43" cy="30" r="16" fill="none" stroke="url(#gold-grad)" stroke-width="9" filter="url(#drop-shadow)"/>
    
    <!-- LÍNEA DE BRILLO INTERIOR (Dorado) -->
    <circle cx="43" cy="30" r="16" fill="none" stroke="#fff" stroke-width="1.2" opacity="0.8"/>

    <!-- ENTRELAZADO (La Magia) -->
    <!-- Dibujamos de nuevo UN PEDAZO del Aro Naranja para que pase POR ENCIMA del Aro Dorado 
         Específicamente el lado Derecho del Aro Naranja. -->
    <g clip-path="url(#clipRight)">
      <clipPath id="clipRight">
        <!-- Cortamos exactamente en el medio horizontal (x=38) pero solo donde cruzan a la derecha -->
        <rect x="42" y="35" width="40" height="40" />
      </clipPath>
      
      <!-- Volvemos a dibujar el Aro Naranja con Sombra para tapar al Dorado en la derecha -->
      <circle cx="33" cy="50" r="16" fill="none" stroke="url(#orange-grad)" stroke-width="9" filter="url(#drop-shadow)"/>
      <circle cx="33" cy="50" r="16" fill="none" stroke="#ffedd5" stroke-width="1.2" opacity="0.6"/>
    </g>
  </g>

  <!-- WORDMARK: "Solennix" -->
  <text
    x="98" y="51"
    font-family="Cinzel, 'Playfair Display', Didot, 'Bodoni MT', Georgia, serif"
    font-size="36"
    font-weight="600"
    letter-spacing="2.8"
    fill="url(#textGold)"
    filter="url(#textGlow)">Solennix</text>

  <linearGradient id="accentLine" x1="98" y1="0" x2="310" y2="0" gradientUnits="userSpaceOnUse">
    <stop offset="0%" stop-color="#b89a6a" stop-opacity="0"/>
    <stop offset="15%" stop-color="#b89a6a" stop-opacity="0.8"/>
    <stop offset="50%" stop-color="#f7f3ed" stop-opacity="1"/>
    <stop offset="85%" stop-color="#b89a6a" stop-opacity="0.8"/>
    <stop offset="100%" stop-color="#b89a6a" stop-opacity="0"/>
  </linearGradient>
  <line x1="98" y1="64" x2="310" y2="64" stroke="url(#accentLine)" stroke-width="1" stroke-linecap="round"/>

</svg>
