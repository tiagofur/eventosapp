<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="EventosApp — La plataforma todo-en-uno para organizar, gestionar y escalar tu negocio de eventos. Calendario, clientes, inventario, cotizaciones y más."
    />
    <meta
      property="og:title"
      content="EventosApp — Gestión Profesional de Eventos"
    />
    <meta
      property="og:description"
      content="Organiza, gestiona y escala tu negocio de eventos con la plataforma diseñada para profesionales."
    />
    <meta property="og:type" content="website" />
    <title>EventosApp — Gestión Profesional de Eventos</title>
    <script type="module">
      if (import.meta.hot?.on) {
        import.meta.hot.on("vite:error", (error) => {
          if (error.err) {
            console.error(
              [error.err.message, error.err.frame].filter(Boolean).join("\n"),
            );
          }
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
